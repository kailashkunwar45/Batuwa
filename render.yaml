services:
  # ─── 1. NestJS API (Web Service) ───────────────────────────────
  - type: web
    name: batuwa-api
    runtime: node
    region: oregon
    plan: free
    rootDir: packages/api
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        sync: false          # set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ─── 2. Admin Dashboard (Static Site) ──────────────────────────
  - type: web
    name: batuwa-admin
    runtime: static
    region: oregon
    plan: free
    rootDir: apps/admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ─── 3. Merchant Portal (Static Site) ──────────────────────────
  - type: web
    name: batuwa-merchant
    runtime: static
    region: oregon
    plan: free
    rootDir: apps/merchant
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
