services:
  # ─── 1. NestJS API (Web Service) ───────────────────────────────
  - type: web
    name: batuwa-api
    env: node
    # Run from root to allow access to workspace dependencies
    buildCommand: npm install && npx prisma generate --schema=packages/api/prisma/schema.prisma && npx turbo run build --filter=@kkollection/api
    startCommand: node packages/api/dist/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        sync: false # Set manually in Render Dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: REDIS_URL
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ─── 2. Admin Dashboard (Static Site) ──────────────────────────
  - type: web
    name: batuwa-admin
    env: static
    buildCommand: npm install && npx turbo run build --filter=admin
    staticPublishPath: apps/admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ─── 3. Merchant Portal (Static Site) ──────────────────────────
  - type: web
    name: batuwa-merchant
    env: static
    buildCommand: npm install && npx turbo run build --filter=merchant
    staticPublishPath: apps/merchant/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
