services:
  # ─── 1. Unified Monolithic Service (API + Frontend Apps) ───────
  - type: web
    name: batuwa-app
    env: node
    # The build command now builds everything (API, Portal, Admin, Merchant)
    # 1. Install dependencies (with legacy-peer-deps for React 19 compatibility)
    # 2. Generate Prisma client
    # 3. Use Turbo to build all apps and packages in parallel
    buildCommand: npm install --legacy-peer-deps && npx prisma generate --schema=packages/api/prisma/schema.prisma && npx turbo run build
    startCommand: node packages/api/dist/src/main.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5001
      - key: DATABASE_URL
        sync: false # Set manually in Render Dashboard
      - key: REDIS_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY_USER_DATA
        generateValue: true
      - key: ENCRYPTION_KEY_KYC
        generateValue: true
      - key: ENCRYPTION_KEY_TRANSACTION
        generateValue: true
      - key: SENDGRID_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
